<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Grid</title>
    <meta name="description" content="Convert JSON data to an interactive, editable grid." />
    <link rel="icon" type="image/x-icon" href="./json-5.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/grid.css" />
  </head>
  <body>
    <div class="app-layout">

      <!-- Editor Panel -->
      <div class="editor-panel" id="editor-panel">

        <!-- Single-editor (normal mode) -->
        <div id="editor-single">
          <div id="editor-cm" class="cm-host"></div>
        </div>

        <!-- Dual-editor (diff mode, hidden by default) -->
        <div id="editor-dual" class="hidden">
          <div class="diff-pane">
            <div class="diff-pane-label">original</div>
            <div id="editor-left" class="cm-host"></div>
          </div>
          <div class="diff-pane">
            <div class="diff-pane-label">modified</div>
            <div id="editor-right" class="cm-host"></div>
          </div>
          <button id="btn-run-diff" class="btn-run-diff" aria-label="Run diff">run diff</button>
        </div>

        <!-- Drop-zone overlay -->
        <div id="drop-overlay" class="drop-overlay" aria-hidden="true">
          <span>drop .json file</span>
        </div>
      </div>

      <!-- Toolbar -->
      <nav class="toolbar" aria-label="Tools">
        <button id="btn-grid" class="btn" aria-label="Render grid">grid</button>
        <button id="btn-clear" class="btn" aria-label="Clear editor">clear</button>
        <button id="btn-paste" class="btn" aria-label="Paste from clipboard">paste</button>
        <button id="btn-format" class="btn" aria-label="Format JSON">fmt</button>

        <div class="toolbar-sep" role="separator"></div>

        <button id="btn-share" class="btn" aria-label="Copy share link">share</button>

        <div class="export-wrap">
          <button id="btn-export" class="btn" aria-label="Export data" aria-expanded="false" aria-haspopup="true">export</button>
          <div id="export-menu" class="export-menu" role="menu" aria-label="Export options">
            <button data-export="json" role="menuitem">JSON</button>
            <button data-export="csv" role="menuitem">CSV</button>
            <button data-export="clipboard" role="menuitem">Copy</button>
          </div>
        </div>

        <button id="btn-diff" class="btn" aria-label="Toggle diff mode">diff</button>

        <div class="toolbar-sep" role="separator"></div>

        <button id="btn-theme" class="btn" aria-label="Toggle theme">light</button>

        <div class="search-wrap">
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="search"
            aria-label="Search grid values"
            autocomplete="off"
            spellcheck="false"
          />
          <span id="search-count" class="search-count" aria-live="polite"></span>
          <button id="search-clear" class="search-clear" aria-label="Clear search">x</button>
        </div>
      </nav>

      <!-- Grid Output -->
      <div class="grid-panel">
        <div id="container" class="json-grid-container" role="region" aria-label="JSON grid output"></div>
      </div>

    </div>

    <!-- Path Panel -->
    <div id="json-path-panel" role="status" aria-live="polite">
      <span id="json-path-display">Hover over a value to see its path</span>
      <button id="copy-path-button" class="btn-inline" aria-label="Copy JSON path">copy path</button>
    </div>

    <!-- Footer -->
    <footer class="footer-bar">
      <a href="https://github.com/dante-e" target="_blank" rel="noopener noreferrer">made by dante e.</a>
    </footer>

    <script type="importmap">
    {
      "imports": {
        "@codemirror/state":        "https://esm.sh/@codemirror/state@6",
        "@codemirror/view":         "https://esm.sh/@codemirror/view@6",
        "@codemirror/commands":     "https://esm.sh/@codemirror/commands@6",
        "@codemirror/lang-json":    "https://esm.sh/@codemirror/lang-json@6",
        "@codemirror/language":     "https://esm.sh/@codemirror/language@6",
        "@codemirror/lint":         "https://esm.sh/@codemirror/lint@6",
        "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6",
        "@lezer/highlight":         "https://esm.sh/@lezer/highlight",
        "lz-string":                "https://esm.sh/lz-string@1"
      }
    }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
